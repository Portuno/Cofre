<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofre Vault - Audio Transcription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .transcript {
            background: white;
            padding: 15px;
            border-radius: 8px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .file-info {
            margin-top: 15px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .record-btn {
            background: #e74c3c;
            margin-top: 10px;
        }

        .record-btn.recording {
            background: #c0392b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Cofre Vault</h1>
        <p class="subtitle">Transcripción de audio con ElevenLabs</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p><strong>Arrastra un archivo de audio aquí</strong></p>
            <p style="color: #999; font-size: 14px; margin-top: 10px;">o haz clic para seleccionar</p>
            <p style="color: #999; font-size: 12px; margin-top: 10px;">Formatos: MP3, WAV, WEBM, OGG, AAC, FLAC</p>
        </div>

        <input type="file" id="fileInput" accept="audio/*">

        <button class="btn record-btn" id="recordBtn">🎤 Grabar Audio</button>

        <div class="file-info" id="fileInfo">
            <p><strong>Archivo:</strong> <span id="fileName"></span></p>
            <p><strong>Tamaño:</strong> <span id="fileSize"></span></p>
        </div>

        <button class="btn" id="transcribeBtn" style="display: none;">Transcribir Audio</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Transcribiendo audio...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h3>📝 Transcripción:</h3>
            <div class="transcript" id="transcript"></div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const recordBtn = document.getElementById('recordBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const error = document.getElementById('error');

        let selectedFile = null;
        let mediaRecorder = null;
        let audioChunks = [];

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Handle file selection
        function handleFile(file) {
            if (!file.type.startsWith('audio/')) {
                showError('Por favor selecciona un archivo de audio válido');
                return;
            }

            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatBytes(file.size);
            fileInfo.classList.add('show');
            transcribeBtn.style.display = 'block';
            result.classList.remove('show');
            error.classList.remove('show');
        }

        // Record audio
        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const file = new File([audioBlob], 'recording.webm', { type: 'audio/webm' });
                        handleFile(file);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    recordBtn.textContent = '⏹️ Detener Grabación';
                    recordBtn.classList.add('recording');
                } catch (err) {
                    showError('No se pudo acceder al micrófono: ' + err.message);
                }
            } else {
                mediaRecorder.stop();
                recordBtn.textContent = '🎤 Grabar Audio';
                recordBtn.classList.remove('recording');
            }
        });

        // Transcribe button
        transcribeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.classList.add('show');
            result.classList.remove('show');
            error.classList.remove('show');
            transcribeBtn.disabled = true;

            const formData = new FormData();
            formData.append('audio', selectedFile);

            try {
                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Error en la transcripción');
                }

                document.getElementById('transcript').textContent = data.transcript || '(Sin contenido)';
                result.classList.add('show');
            } catch (err) {
                showError(err.message);
            } finally {
                loading.classList.remove('show');
                transcribeBtn.disabled = false;
            }
        });

        function showError(message) {
            error.textContent = '❌ ' + message;
            error.classList.add('show');
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
